<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tubarão-Baleia Realista</title>
    <link rel="stylesheet" href="style.css">
    <script src="sript.js"></script>
</head>
<body>

<div class="ocean">

    <div class="whale-shark">

        <svg viewBox="0 0 900 400">

            <defs>

                <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%">
                    <stop offset="0%" stop-color="#6f8793"/>
                    <stop offset="60%" stop-color="#4c6470"/>
                    <stop offset="100%" stop-color="#314853"/>
                </linearGradient>

                <linearGradient id="bellyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#c7d3d9"/>
                    <stop offset="100%" stop-color="#95aab5"/>
                </linearGradient>

            </defs>

            <!-- Corpo -->
            <g class="body-group">

                <path class="body"
                    d="
                    M120 200
                    C180 120, 320 90, 520 120
                    C650 140, 740 170, 790 200
                    C740 230, 650 260, 520 280
                    C320 310, 180 280, 120 200 Z"
                    fill="url(#bodyGradient)"
                />

                <!-- Barriga -->
                <path
                    d="
                    M150 215
                    C260 270, 500 275, 760 210
                    C650 270, 350 310, 150 215 Z"
                    fill="url(#bellyGradient)"
                    opacity=".95"
                />

                <!-- Boca -->
                <path
                    d="M90 205 Q110 220 145 215"
                    fill="none"
                    stroke="#25343d"
                    stroke-width="3"
                />

                <!-- Olho -->
                <circle cx="165" cy="175" r="6" fill="#111"/>

                <!-- Nadadeira dorsal -->
                <path
                    d="
                    M420 120
                    L470 35
                    L520 135 Z"
                    fill="#425964"
                />

                <!-- Nadadeira peitoral -->
                <path
                    d="
                    M380 220
                    C460 280, 520 290, 560 240
                    C500 235, 450 220, 380 220 Z"
                    fill="#3d525d"
                />

                <!-- Cauda -->
                <g class="tail">
                    <path
                        d="
                        M760 165
                        C850 90, 900 120, 890 180
                        C900 240, 850 280, 760 235 Z"
                        fill="#3a505a"
                    />
                </g>

                <!-- Pintas -->
                <g class="spots"></g>

            </g>

        </svg>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
